spring.application.name=ms-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webmvc.routes[0].id=ms-pacientes
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ms-pacientes
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/pacientes/**

spring.cloud.gateway.server.webmvc.routes[1].id=ms-citas
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ms-citas
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/citas/**

spring.cloud.gateway.server.webmvc.routes[2].id=ms-recetas
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://ms-recetas
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/recetas/**
